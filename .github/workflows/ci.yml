name: CI/CD

on:
  push:
    branches: [main, develop, "feature/**", "bugfix/**", "release/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    name: Phase 1 - Vérifications préliminaires
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Vérification de la structure
        run: |
          test -f app/main.py
          test -f app/__init__.py
          test -f Dockerfile
          test -f requirements.txt

  quality:
    name: Phase 2 - Contrôles qualité
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Linting (flake8)
        run: flake8 app/ tests/ --max-line-length=100
      - name: Formatage (black)
        run: black --check --diff app/ tests/
      - name: Analyse statique (mypy)
        run: mypy app/ --ignore-missing-imports
      - name: Sécurité (bandit)
        run: bandit -r app/ -x app/templates

  test:
    name: Phase 3 - Tests
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Tests unitaires et intégration
        run: pytest tests/ -v --cov=app --cov-report=term --cov-report=xml
      - name: Upload rapport de couverture
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: Phase 4 - Construction
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Construire l'image Docker
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - name: Taguer l'image
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

  integration-test:
    name: Phase 5 - Tests sur l'artefact
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Construire l'image
        run: docker build -t nexa-social-test .
      - name: Démarrer l'application
        run: |
          # Nettoyage préventif
          docker rm -f nexa-test 2>/dev/null || true
          docker run -d --name nexa-test \
            -e SECRET_KEY=test-secret \
            -p 5000:5000 nexa-social-test
      - name: Vérifier l'accessibilité
        run: |
          for i in $(seq 1 10); do
            sleep 2
            curl -sf http://localhost:5000/wall && exit 0
            docker ps --filter name=nexa-test --format "{{.Status}}"
            docker logs nexa-test 2>&1 | tail -3
            echo "Tentative $i/10 - serveur pas encore pret"
          done
          exit 1
      - name: Nettoyage
        if: always()
        run: docker rm -f nexa-test 2>/dev/null || true

  security-scan:
    name: Phase 6 - Vérifications de sécurité
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Vérification des secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --disable-plugin KeywordDetector --exclude-files '.*\.gitignore|\.env\.example|\.github/.*' > /dev/null 2>&1 || true
      - name: Analyse de sécurité
        run: bandit -r app/ -x app/templates -ll

  deploy:
    name: Phase 7 - Déploiement
    needs: [integration-test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Déploiement vers le VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            bash /opt/deploy.sh

  post-deploy:
    name: Phase 8 - Vérifications post-déploiement
    needs: deploy
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Vérification post-déploiement
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sleep 3
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/)
            if [ "$STATUS" != "200" ]; then
              echo "❌ Healthcheck échoué: HTTP $STATUS"
              exit 1
            fi
            echo "✅ Application saine (HTTP $STATUS)"
            docker ps --filter name=nexa-web --format "Container: {{.Names}} - {{.Status}}"
