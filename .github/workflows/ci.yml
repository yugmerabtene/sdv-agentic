name: CI/CD

on:
  push:
    branches: [main, develop, "feature/**", "bugfix/**", "release/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    name: "Phase 1 — Vérifications préliminaires"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Vérifier la structure du projet
        run: |
          test -f app/main.py
          test -f app/__init__.py
          test -f Dockerfile
          test -f requirements.txt
          echo "Structure OK"

  quality:
    name: "Phase 2 — Contrôles qualité"
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Linting & format (ruff)
        run: ruff check app/ tests/
      - name: Vérification de types (mypy)
        run: mypy app/ --ignore-missing-imports
      - name: Analyse sécurité statique (bandit)
        run: bandit -r app/ -x app/templates

  test:
    name: "Phase 3 — Tests"
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Exécuter les tests
        run: pytest tests/ -v --cov=app --cov-report=term --cov-report=xml --cov-fail-under=80
      - name: Upload rapport de couverture
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: "Phase 4 — Construction Docker"
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Construire l'image Docker
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - name: Taguer l'image
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

  integration-test:
    name: "Phase 5 — Tests sur l'artefact"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Construire l'image de test
        run: docker build -t app-test .
      - name: Démarrer l'application
        run: |
          docker rm -f app-test-ctn 2>/dev/null || true
          docker run -d --name app-test-ctn \
            -e SECRET_KEY=test-secret \
            -p 8000:8000 app-test
      - name: Vérifier l'accessibilité (healthcheck)
        run: |
          for i in $(seq 1 10); do
            sleep 2
            curl -sf http://localhost:8000/health && echo "App OK" && exit 0
            docker ps --filter name=app-test-ctn --format "{{.Status}}"
            echo "Tentative $i/10"
          done
          exit 1
      - name: Nettoyage
        if: always()
        run: docker rm -f app-test-ctn 2>/dev/null || true

  security-scan:
    name: "Phase 6 — Scan de sécurité"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Vérification des secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --disable-plugin KeywordDetector \
            --exclude-files '.*\.gitignore|\.env\.example|\.github/.*' > /dev/null 2>&1 || true
      - name: Scan de vulnérabilités (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: table
          exit-code: 1

  deploy:
    name: "Phase 7 — Déploiement"
    needs: [integration-test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Déploiement vers le VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            bash /opt/deploy.sh

  post-deploy:
    name: "Phase 8 — Vérifications post-déploiement"
    needs: deploy
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Vérification post-déploiement
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sleep 3
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/health)
            if [ "$STATUS" != "200" ]; then
              echo "Healthcheck échoué: HTTP $STATUS"
              bash /opt/rollback.sh 2>/dev/null || true
              exit 1
            fi
            echo "Application saine (HTTP $STATUS)"
            docker ps --filter name=sdv-web --format "Container: {{.Names}} - {{.Status}}"
