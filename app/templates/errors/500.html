{% extends "base.html" %}
{% block title %}Erreur serveur - Nexa Social{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12">
    <div class="text-center max-w-md">
        <div class="w-20 h-20 mx-auto rounded-2xl bg-[#fef2f2] flex items-center justify-center mb-8">
            <svg class="w-10 h-10 text-[#ef4444]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>
        <h1 class="text-2xl sm:text-3xl font-bold text-[#0f172a] mb-3">Erreur serveur</h1>
        <p class="text-[#475569] mb-8">Une erreur inattendue s'est produite. Veuillez réessayer plus tard.</p>
        <a href="{{ url_for('posts.wall') }}" class="inline-flex items-center gap-2 bg-[#4f46e5] text-white px-6 py-3 rounded-full hover:bg-[#818cf8] hover:shadow-lg transition-all duration-200 font-medium">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            Retour au mur
        </a>
    </div>
</div>
{% endblock %}
